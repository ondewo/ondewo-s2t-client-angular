#############################################################################################
# pre-commit — language-agnostic hooks for this non-python repo (Angular/TS speech-to-text  #
# client). Language-specific linting/formatting stays with the repo's own toolchain          #
# (eslint/prettier via husky). Ruff/mypy/uv are python-only and NOT included here.           #
#############################################################################################

# Never touch generated / vendored code. Tuned for this repo:
#   node_modules/            vendored npm deps
#   api/                     generated proto TS stubs (*.pb.ts / *.pbconf.ts / *.pbsc.ts)
#   fesm2022/                generated Angular build output (*.mjs / *.mjs.map)
#   ondewo-proto-compiler/   git submodule
#   src/ondewo-s2t-api/      git submodule (proto api)
#   *.d.ts / *.d.ts.map / *.metadata.json / index.d.ts   generated type declarations
#   package-lock.json        vendored lockfile
# NOTE: src/lib/auth/ is HAND-WRITTEN and stays in scope (the generic `lib/` exclude that
# ships with the template would wrongly drop it, so it is intentionally not used here).
exclude: |
  (?x)(
      ^(node_modules|api|fesm2022)/
      |^(ondewo-proto-compiler|src/ondewo-s2t-api)(/|$)
      |^(index\.d\.ts|ondewo-s2t-client-angular\.d\.ts|ondewo-s2t-client-angular\.metadata\.json|package-lock\.json)$
      |(^|/)(node_modules|dist|build|\.venv)/
      |\.d\.ts\.map$
      |(_pb\.(js|d\.ts)$|_pb2\.pyi?$|_pb2_grpc\.py$|_grpc_pb\.(js|d\.ts)$)
  )

fail_fast: false

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
